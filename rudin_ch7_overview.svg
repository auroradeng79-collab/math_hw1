<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fce7f3"/><stop offset="1" stop-color="#fbcfe8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="980" height="720" fill="#fafaf9"/>
  <text x="490" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#1c1917">Rudin · Chapter 7 — Sequences &amp; Series of Functions</text>
  <text x="490" y="66" text-anchor="middle" font-size="15" fill="#57534e" font-style="italic">Core question: when may two limit processes be interchanged?</text>

  <!-- Central problem box -->
  <rect x="330" y="88" width="320" height="74" rx="10" fill="url(#g1)" stroke="#d97706" stroke-width="1.5"/>
  <text x="490" y="116" text-anchor="middle" font-size="16" font-weight="bold" fill="#78350f">The Main Problem (§7.1–7.6)</text>
  <text x="490" y="140" text-anchor="middle" font-size="15" fill="#78350f">lim<tspan baseline-shift="sub" font-size="10">t→x</tspan> lim<tspan baseline-shift="sub" font-size="10">n→∞</tspan> f<tspan baseline-shift="sub" font-size="10">n</tspan>(t)  =?  lim<tspan baseline-shift="sub" font-size="10">n→∞</tspan> lim<tspan baseline-shift="sub" font-size="10">t→x</tspan> f<tspan baseline-shift="sub" font-size="10">n</tspan>(t)</text>

  <!-- Pointwise fails -->
  <rect x="40" y="200" width="400" height="120" rx="10" fill="#fff" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="240" y="226" text-anchor="middle" font-size="15" font-weight="bold" fill="#b91c1c">✗ Pointwise convergence is too weak</text>
  <text x="60" y="252" font-size="13" fill="#3f3f46">• 7.3  Σ continuous fₙ → discontinuous sum</text>
  <text x="60" y="274" font-size="13" fill="#3f3f46">• 7.4  fₙ continuous → non-integrable limit</text>
  <text x="60" y="296" font-size="13" fill="#3f3f46">• 7.5  (fₙ)′ ↛ f′    • 7.6  ∫fₙ ↛ ∫f</text>
  <text x="60" y="314" font-size="12" fill="#9ca3af" font-style="italic">limits, ∫, and d/dx do NOT commute in general</text>

  <!-- Uniform convergence definition -->
  <rect x="540" y="200" width="400" height="120" rx="10" fill="url(#g2)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="740" y="226" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">✓ Uniform Convergence (§7.7–7.10)</text>
  <text x="560" y="252" font-size="13" fill="#1e3a8a">Def 7.7  ∀ε ∃N: n≥N ⇒ |fₙ(x)−f(x)|≤ε  ∀x</text>
  <text x="560" y="274" font-size="13" fill="#1e3a8a">7.8  Cauchy criterion (one N for all x)</text>
  <text x="560" y="296" font-size="13" fill="#1e3a8a">7.9  Mₙ = sup|fₙ−f| → 0</text>
  <text x="560" y="314" font-size="13" fill="#1e3a8a">7.10 Weierstrass M-test:  Σ Mₙ &lt; ∞ ⇒ unif.</text>

  <line x1="490" y1="162" x2="240" y2="200" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="490" y1="162" x2="740" y2="200" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="300" y="186" font-size="12" fill="#b91c1c">counter-examples</text>
  <text x="640" y="186" font-size="12" fill="#1d4ed8">the cure</text>

  <!-- Positive theorems -->
  <rect x="40" y="360" width="900" height="118" rx="10" fill="url(#g3)" stroke="#15803d" stroke-width="1.5"/>
  <text x="490" y="386" text-anchor="middle" font-size="15" font-weight="bold" fill="#14532d">Positive Results — uniform convergence preserves structure</text>
  <text x="70" y="414" font-size="13" fill="#14532d">7.11  lim &amp; lim interchange ✓</text>
  <text x="70" y="436" font-size="13" fill="#14532d">7.12  fₙ cont. ⇒ f continuous</text>
  <text x="370" y="414" font-size="13" fill="#14532d">7.16  ∫ lim fₙ = lim ∫ fₙ</text>
  <text x="370" y="436" font-size="13" fill="#14532d">7.17  (lim fₙ)′ = lim fₙ′  (if fₙ′ unif.)</text>
  <text x="680" y="414" font-size="13" fill="#14532d">7.18  ∃ continuous,</text>
  <text x="680" y="436" font-size="13" fill="#14532d">      nowhere-differentiable fn</text>
  <text x="490" y="462" text-anchor="middle" font-size="12" font-style="italic" fill="#166534">7.14–7.15  𝒞(X) with ‖f‖=sup|f| is a COMPLETE metric space (Banach)</text>

  <line x1="740" y1="320" x2="490" y2="360" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Two advanced pillars -->
  <rect x="40" y="510" width="430" height="150" rx="10" fill="url(#g4)" stroke="#a21caf" stroke-width="1.5"/>
  <text x="255" y="536" text-anchor="middle" font-size="15" font-weight="bold" fill="#701a75">Equicontinuity &amp; Compactness (§7.19–7.25)</text>
  <text x="60" y="562" font-size="13" fill="#701a75">7.19  pointwise / uniformly bounded</text>
  <text x="60" y="584" font-size="13" fill="#701a75">7.22  equicontinuous family</text>
  <text x="60" y="606" font-size="13" fill="#701a75">7.23  bounded seq ⇒ ptwise-conv. subseq</text>
  <text x="60" y="628" font-size="13" fill="#701a75">7.25  Arzelà–Ascoli: ptwise bdd +</text>
  <text x="60" y="648" font-size="13" fill="#701a75">      equicont. on compact K ⇒ unif. subseq</text>

  <rect x="510" y="510" width="430" height="150" rx="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="725" y="536" text-anchor="middle" font-size="15" font-weight="bold" fill="#312e81">Stone–Weierstrass (§7.26–7.33)</text>
  <text x="530" y="562" font-size="13" fill="#312e81">7.26  Weierstrass: polynomials are dense</text>
  <text x="530" y="584" font-size="13" fill="#312e81">      in 𝒞[a,b]  (uniform approximation)</text>
  <text x="530" y="606" font-size="13" fill="#312e81">7.32  Stone: a subalgebra of 𝒞(K,ℝ) that</text>
  <text x="530" y="626" font-size="13" fill="#312e81">      separates points &amp; vanishes nowhere</text>
  <text x="530" y="646" font-size="13" fill="#312e81">      is dense.  7.33 complex case (+ self-adj.)</text>

  <line x1="255" y1="478" x2="255" y2="510" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="725" y1="478" x2="725" y2="510" stroke="#444" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="490" y="694" text-anchor="middle" font-size="12" fill="#78716c">Book pp. 143–171  ·  builds toward Ch. 8 (power series, eˣ, trig, Fourier, Γ)</text>
</svg>
